name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Fast, deterministic gate: typecheck + lint + unit tests + coverage.
  # No FFmpeg needed — domain/use-case logic is tested with fakes.
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test:cov
      # These examples have no FFmpeg/media dependency and guard their public API
      # imports plus playlist usage from silently drifting.
      - run: pnpm example 00-hello
      - run: pnpm example 09-playlist-manipulation

  # Opt-in end-to-end job: real FFmpeg on tiny fixture clips.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      # Use Ubuntu's signed package rather than a third-party static build.
      # The latter's ffprobe binary crashes while reading the MPEG-TS segments
      # generated by this suite on GitHub-hosted runners.
      - name: Install FFmpeg and ffprobe
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg
          ffmpeg -version
          ffprobe -version
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test:e2e
