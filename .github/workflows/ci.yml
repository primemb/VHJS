name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Fast, deterministic gate: typecheck + lint + unit tests + coverage.
  # No FFmpeg needed — domain/use-case logic is tested with fakes.
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test:cov

  # Opt-in end-to-end job: real FFmpeg on tiny fixture clips.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # e2e suite is added in Phase 3; placeholder keeps the job wired.
      - run: pnpm test
