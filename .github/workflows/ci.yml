name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Fast, deterministic gate: typecheck + lint + unit tests + coverage.
  # No FFmpeg needed — domain/use-case logic is tested with fakes.
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test:cov
      # These examples have no FFmpeg/media dependency and guard their public API
      # imports plus playlist usage from silently drifting.
      - run: pnpm example 00-hello
      - run: pnpm example 09-playlist-manipulation

  # Opt-in end-to-end job: real FFmpeg on tiny fixture clips.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      # Use Ubuntu's signed package rather than a third-party static build.
      # The latter's ffprobe binary crashes while reading the MPEG-TS segments
      # generated by this suite on GitHub-hosted runners.
      - name: Install FFmpeg and ffprobe
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg
          ffmpeg -version
          ffprobe -version
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test:e2e

  publish:
    name: Publish npm package
    # A release is created only by a version-changing commit on main, after every
    # cross-platform check and the real-FFmpeg E2E suite have passed.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [check, e2e]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - name: Detect a version change
        id: release
        shell: bash
        run: |
          current_version="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")"
          previous_version="$(git show HEAD^:package.json | node -p "JSON.parse(require('node:fs').readFileSync(0, 'utf8')).version")"
          if [[ "$current_version" == "$previous_version" ]]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged ($current_version); publication skipped."
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "Publishing $previous_version -> $current_version."
          fi
      - name: Publish changed version
        if: steps.release.outputs.should_publish == 'true'
        run: pnpm publish --access public
        env:
          # pnpm is the required project package manager; this asks npm to emit
          # provenance when the trusted-publisher OIDC exchange succeeds.
          NPM_CONFIG_PROVENANCE: "true"
